{% extends "base.html" %}
{% block content %}

<div style="display:flex; justify-content:center; align-items:center; height:90vh;">

    <div style="
        width:400px;
        padding:40px;
        background:rgba(255,255,255,0.05);
        border-radius:15px;
        backdrop-filter:blur(10px);
    ">

        <h2 style="text-align:center; margin-bottom:10px;">Welcome Back</h2>
        <p style="text-align:center; opacity:0.7; margin-bottom:30px;">
            Secure access to the Electra
        </p>

        <form method="POST">

            <label>Username</label>
            <input type="text"
                   name="username"
                   required
                   style="width:100%;
                          padding:10px;
                          margin-bottom:20px;
                          border-radius:8px;
                          border:none;">

            <label>Password</label>

            <div style="position:relative;">
                <input type="password"
                       name="password"
                       id="loginPassword"
                       required
                       style="width:100%;
                              padding:10px 40px 10px 10px;
                              border-radius:8px;
                              border:none;">

                <span onclick="toggleLoginPassword()"
                      style="position:absolute;
                             right:10px;
                             top:50%;
                             transform:translateY(-50%);
                             cursor:pointer;">
                    👁
                </span>
            </div>

            <!-- Forgot Password -->
            <div style="text-align:right; margin-top:8px; margin-bottom:20px;">
                <a href="{{ url_for('forgot_password') }}"
                   style="font-size:13px; color:#60a5fa; text-decoration:none;">
                    Forgot password?
                </a>
            </div>

            <button type="submit"
                    style="width:100%;
                           padding:12px;
                           border:none;
                           border-radius:8px;
                           background:#3b82f6;
                           color:white;">
                Login
            </button>

        </form>

        <p style="text-align:center; margin-top:20px;">
            Don’t have an account?
            <a href="{{ url_for('register') }}" style="color:#60a5fa;">
                Register here
            </a>
        </p>

    </div>
</div>

<script>
function toggleLoginPassword() {
    var pass = document.getElementById("loginPassword");

    if (pass.type === "password") {
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}
</script>

{% endblock %}
